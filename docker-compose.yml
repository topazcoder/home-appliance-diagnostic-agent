version: "3.9"

# Unified SHS Appliance Diagnostic Agent
# Combines the voice platform (Team A) and the business/diagnostic backend (Team B)
# into a single deployable unit.
#
# Start everything:
#   docker compose up --build
#
# Required environment variables (copy .env.example → .env and fill in values):
#   OPENAI_API_KEY, TWILIO_ACCOUNT_SID, TWILIO_AUTH_TOKEN, TWILIO_PHONE_NUMBER, PUBLIC_BASE_URL

services:
  # PostgreSQL + pgvector
  db:
    image: pgvector/pgvector:pg16
    container_name: shs-db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
      POSTGRES_DB:       ${POSTGRES_DB:-appdiag}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
    networks:
      - shs-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (Twilio voice session state)
  redis:
    image: redis:7-alpine
    container_name: shs-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    networks:
      - shs-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Unified App: Diagnostic Backend + Voice Agent
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shs-app
    restart: unless-stopped
    entrypoint: ["/app/entrypoint.sh"]
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-123456}@db:5432/${POSTGRES_DB:-appdiag}
      REDIS_URL:    redis://redis:6379
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - shs-network

  # ── Nginx — reverse proxy, port 80 → app:8000 ───────────────────────────
  nginx:
    image: nginx:alpine
    container_name: shs-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - shs-network

volumes:
  pgdata:

networks:
  shs-network:
    driver: bridge
